name: One-time source import

on:
  push:
    branches: [main]
    paths:
      - .github/import/kapwa-os.zip.b64

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decode and import source tree
        shell: bash
        run: |
          set -euo pipefail
          test -f .github/import/kapwa-os.zip.b64
          mkdir -p /tmp/kapwa-import
          base64 --decode .github/import/kapwa-os.zip.b64 > /tmp/kapwa-os.zip
          unzip -q /tmp/kapwa-os.zip -d /tmp/kapwa-import
          cp -a /tmp/kapwa-import/. .
          rm -f .github/import/kapwa-os.zip.b64 TEMP TEMP2
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: import complete KAPWA Resort OS source" || exit 0
          git push origin HEAD:main
