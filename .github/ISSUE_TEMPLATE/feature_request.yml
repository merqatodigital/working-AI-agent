name: Feature request
description: Propose an improvement to KAPWA Resort OS
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operational problem should this solve?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the user-visible result rather than only an implementation.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Approval, security, or tenant impact
      description: Note any external action, sensitive data, or cross-tenant consideration.
