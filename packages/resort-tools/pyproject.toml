[project]
name = "resort-tools"
version = "0.1.0"
description = "LangChain tool definitions for KAPWA Resort OS"
requires-python = ">=3.12"
dependencies = [
    "resort-types",
    "resort-data",
    "langchain-core>=1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/resort_tools"]
