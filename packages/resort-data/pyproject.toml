[project]
name = "resort-data"
version = "0.1.0"
description = "Mock resort data layer for KAPWA Resort OS"
requires-python = ">=3.12"
dependencies = [
    "resort-types",
    "orjson>=3.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/resort_data"]
