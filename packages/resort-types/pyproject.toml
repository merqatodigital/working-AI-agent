[project]
name = "resort-types"
version = "0.1.0"
description = "Shared Pydantic models and type definitions for KAPWA Resort OS"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "typing-extensions>=4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/resort_types"]
